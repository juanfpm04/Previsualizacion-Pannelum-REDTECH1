        visibility: hidden;
        position: absolute;
        background: linear-gradient(180deg, #ffffff 246px, #F4F4F4 247px,#F4F4F4);
         box-shadow: 2px 2px 5px #333333;
        border-radius: 5px;
        width: 244px;    
        text-align: center;
        cursor: default;
        font-weight: bold;

    }
    img {
        margin-top: 8px;
        width: 230px;
        height: 230px;
        object-fit: cover;
    }
    div.custom-tooltip:hover span{
        visibility: visible;
    }
    .enlace-menu {
        background-color: #001F4B;
        border: none;
        color: white;
        padding: 15px 30px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 15px 15px;
        cursor: pointer;
        border-radius: 5px;
}
.enlace-menu:hover {
  background-color:  #00D78B; 
  color: white;
}
div.custom-tooltip:hover .enlace-menu {
    transition: background-color 0.4s;
}

function createImageTooltip(div, args) {
    var span = document.createElement('span');
    document.getElementById('panorama')
    span.style.maxWidth = 'initial';
    var image = document.createElement('img');
    span.innerHTML = `
    <img src="${args[0]}" width="95%"> 
    <h2>${args[2]}</h2>
    <h1>${args[1]}</h1>
    <a href="${args[4]}" class="enlace-menu" target="_blank">${args[3]}</a>
    `;
    div.classList.add('custom-tooltip');
    div.appendChild(span);
    span.style.width = span.scrollWidth - 0 + 'px';
    span.style.marginLeft = -(span.scrollWidth - div.offsetWidth) / 2 + 'px';
    span.style.marginTop = -span.scrollHeight / 2 + 'px';
}
